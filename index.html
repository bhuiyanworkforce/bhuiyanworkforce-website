    <!-- JSON-LD: FAQ (enables rich FAQ results in Google Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How quickly can you supply workers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For most trade categories, we can present a verified shortlist within 5–10 working days. After employer selection, the full documentation and visa process typically takes 4–8 weeks depending on the destination country. For countries with streamlined visa procedures (e.g. Malaysia, UAE), timelines are often faster."
          }
        },
        {
          "@type": "Question",
          "name": "What is your minimum order size?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We handle both small deployments (5–10 workers) and large-scale mobilisations (200+ workers). There is no minimum order."
          }
        },
        {
          "@type": "Question",
          "name": "Do you handle all the documentation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We manage BMET registration, Bureau of Manpower clearance, GAMCA medical examinations for Gulf destinations, police clearance certificates, passport validity checks, and the visa application process. You provide a valid demand letter and employment contract; we handle the rest."
          }
        },
        {
          "@type": "Question",
          "name": "What if a worker underperforms or leaves early?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer a replacement guarantee for workers who leave within the first 90 days for reasons attributable to misrepresentation on their CV or skills test. We will work with you to replace the worker as quickly as possible at no additional placement fee."
          }
        },
        {
          "@type": "Question",
          "name": "What countries do you deploy workers to?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We currently deploy to 25+ countries including Saudi Arabia, UAE, Qatar, Kuwait, Oman, Bahrain, Jordan, Malaysia, Singapore, Maldives, Italy, Portugal, Greece, Romania, Poland, Hungary, Croatia, Czech Republic, Lithuania, Latvia, Estonia, Bulgaria, Cyprus, and Bosnia and Herzegovina."
          }
        },
        {
          "@type": "Question",
          "name": "What are your recruitment fees?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our fees vary based on worker category, numbers, and destination country. We provide a fully itemised cost breakdown before you commit to anything. We operate on a success-fee model — you pay only after workers are confirmed for deployment."
          }
        },
        {
          "@type": "Question",
          "name": "Do workers pay a recruitment fee?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Fees vary depending on the service package and destination country. Please contact us directly to discuss your situation and get a clear breakdown of applicable costs."
          }
        },
        {
          "@type": "Question",
          "name": "Will workers receive a contract before they travel?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Workers receive a verified employment contract in Bengali before they agree to travel. It clearly states job title, salary, working hours, accommodation arrangements, and contract duration."
          }
        },
        {
          "@type": "Question",
          "name": "What is GAMCA and why is it required?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GAMCA (Gulf Approved Medical Centre Association) medical testing is a mandatory health clearance required by all GCC countries before a worker's visa can be processed. It screens for communicable diseases and general fitness for work. We coordinate GAMCA appointments for all workers going to Gulf destinations."
          }
        }
      ]
    }
    </script>
